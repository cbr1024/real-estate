version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: apartment-nginx
    ports:
      - "4001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - node-server
    networks:
      - apartment-network
    restart: unless-stopped

  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apartment-client
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - NAVER_MAP_CLIENT_ID=${NAVER_MAP_CLIENT_ID}
      - VITE_TOSS_CLIENT_KEY=${TOSS_CLIENT_KEY}
    networks:
      - apartment-network
    restart: unless-stopped

  node-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apartment-node-server
    expose:
      - "4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_APP_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - NAVER_MAP_CLIENT_ID=${NAVER_MAP_CLIENT_ID}
      - NAVER_MAP_CLIENT_SECRET=${NAVER_MAP_CLIENT_SECRET}
      - DATA_GO_KR_API_KEY=${DATA_GO_KR_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY}
      - TOSS_CLIENT_KEY=${TOSS_CLIENT_KEY}
      - APP_URL=http://localhost
    depends_on:
      - postgres
      - redis
    networks:
      - apartment-network
    restart: unless-stopped

  python-server:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: apartment-python-server
    expose:
      - "8000"
    volumes:
      - ./backoffice:/app
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_APP_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATA_GO_KR_API_KEY=${DATA_GO_KR_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - apartment-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: apartment-postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - apartment-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: apartment-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - apartment-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  apartment-network:
    driver: bridge
